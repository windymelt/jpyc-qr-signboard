name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'sbt'

      - name: Setup sbt
        uses: sbt/setup-sbt@v1

      - name: Build fat jar
        run: sbt assembly

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: target/scala-3.3.3/jpyc-qr-signboard-*.jar
          generate_release_notes: true
